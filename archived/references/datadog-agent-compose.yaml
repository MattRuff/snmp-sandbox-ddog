# Datadog Agent service - add to docker-compose.yaml when ready
# Reference only - use your own agent with generic autodiscovery (172.20.0.0/24)

  datadog-agent:
    container_name: datadog-agent
    image: gcr.io/datadoghq/agent:latest
    environment:
      - DD_API_KEY=<API_KEY> # TO BE REPLACED
      - DD_SITE=datadoghq.com
      - DD_HOSTNAME=snmp.sandbox.docker
      - DD_TAGS=env:sandbox owner:dd_sandbox
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_DOCKER_LABELS_AS_TAGS=true
      - DD_DOCKER_ENV_AS_TAGS=true
      - DD_SYSTEM_PROBE_ENABLED=true
      - DD_PROCESS_AGENT_ENABLED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup:/host/sys/fs/cgroup:ro
      - ./tcpdump/:/tcpdumps/
      - /sys/kernel/debug:/sys/kernel/debug
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - SYS_PTRACE
      - NET_ADMIN
      - NET_BROADCAST
      - NET_RAW
      - IPC_LOCK
      - CHOWN
    security_opt:
      - apparmor:unconfined
    networks:
      static-network:
        ipv4_address: 172.20.0.240
